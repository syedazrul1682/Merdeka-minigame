<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Merdeka! — Ular & Tangga</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --red:#E8001A; --red-dk:#9a0010; --blue:#003FA3; --blue-dk:#001f5c;
  --gold:#F5A800; --gold-dk:#b87800; --cream:#FFFDF5; --ink:#1a0a00;
  --muted:#6a5a40; --green:#00A846; --green-dk:#006025;
}
html, body { width:100%; max-width:430px; margin:0 auto; background:#FFF6E0; color:var(--ink); font-family:'Nunito',sans-serif; overflow-x:hidden; }

/* HEADER */
.site-header { background:var(--blue); border-bottom:4px solid var(--gold); }
.header-stripes { height:6px; background:repeating-linear-gradient(90deg,var(--red) 0%,var(--red) 7.14%,#fff 7.14%,#fff 14.28%,var(--red) 14.28%,var(--red) 21.42%,#fff 21.42%,#fff 28.56%,var(--red) 28.56%,var(--red) 35.7%,#fff 35.7%,#fff 42.84%,var(--red) 42.84%,var(--red) 49.98%,#fff 49.98%,#fff 57.12%,var(--red) 57.12%,var(--red) 64.26%,#fff 64.26%,#fff 71.4%,var(--red) 71.4%,var(--red) 78.54%,#fff 78.54%,#fff 85.68%,var(--red) 85.68%,var(--red) 92.82%,#fff 92.82%,#fff 100%); }
.header-inner { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; }
.header-title { font-family:'Lilita One',cursive; font-size:1.8rem; color:var(--gold); text-shadow:2px 2px 0 var(--gold-dk); letter-spacing:2px; line-height:1; }
.header-sub { color:rgba(255,255,255,0.75); font-size:0.6rem; font-weight:800; letter-spacing:3px; text-transform:uppercase; margin-top:2px; }
.header-flag { font-size:1.8rem; }

/* SCOREBOARD */
.scoreboard { display:flex; gap:8px; padding:10px 12px 0; }
.score-card { flex:1; background:#fff; border-radius:14px; border:2.5px solid var(--ink); box-shadow:3px 3px 0 var(--ink); padding:9px 10px; position:relative; transition:all 0.2s; }
.score-card.active { border-color:var(--gold); box-shadow:3px 3px 0 var(--gold-dk); background:#fffae6; }
.score-card.active::after { content:'▶'; position:absolute; top:8px; right:8px; color:var(--gold); font-size:0.75rem; }
.sc-top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.token { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; border:2.5px solid var(--ink); box-shadow:2px 2px 0 var(--ink); flex-shrink:0; }
.sc-name { font-weight:900; font-size:0.82rem; line-height:1.1; }
.sc-pos { font-size:0.62rem; color:var(--muted); font-weight:700; }
.sc-pts { font-family:'Lilita One',cursive; font-size:1.5rem; color:var(--red); margin-left:auto; padding-right:14px; }
.prog-rail { height:7px; background:#e8e0cc; border-radius:4px; overflow:hidden; border:1.5px solid #c8b890; }
.prog-fill { height:100%; border-radius:3px; transition:width 0.5s cubic-bezier(0.34,1.56,0.64,1); }

/* BOARD */
.board-wrap { padding:10px 12px; }
.board-frame { background:var(--blue); border-radius:16px; border:3px solid var(--ink); box-shadow:6px 6px 0 var(--ink); padding:8px; position:relative; }
.board-frame::before { content:''; position:absolute; inset:3px; border-radius:12px; border:2px solid var(--gold); pointer-events:none; z-index:1; }
canvas { display:block; width:100%; height:auto; border-radius:4px; }

/* CONTROLS */
.controls { padding:0 12px 10px; display:flex; flex-direction:column; gap:8px; }
.dice-row { display:flex; align-items:center; gap:10px; }
.die { width:70px; height:70px; background:#fff; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:42px; border:3px solid var(--ink); box-shadow:3px 3px 0 var(--ink); cursor:pointer; user-select:none; transition:transform 0.1s; flex-shrink:0; }
.die.shake { animation:dieShake 0.08s ease-in-out infinite; }
@keyframes dieShake { 0%{transform:rotate(-14deg) scale(0.88);} 50%{transform:rotate(14deg) scale(1.1);} 100%{transform:rotate(-14deg) scale(0.88);} }
.roll-btn { flex:1; padding:14px 10px; background:var(--red); color:#fff; border:3px solid var(--ink); border-radius:14px; font-family:'Fredoka One',cursive; font-size:1.1rem; letter-spacing:1px; cursor:pointer; box-shadow:4px 4px 0 var(--ink); transition:all 0.1s; -webkit-tap-highlight-color:transparent; }
.roll-btn:active:not(:disabled) { transform:translate(3px,3px); box-shadow:1px 1px 0 var(--ink); }
.roll-btn:disabled { background:#bbb; cursor:not-allowed; box-shadow:3px 3px 0 #888; }
.turn-lbl { text-align:center; font-size:0.68rem; font-weight:900; color:var(--blue); letter-spacing:2px; text-transform:uppercase; }
.msg { border-radius:10px; padding:10px 13px; font-size:0.82rem; font-weight:700; line-height:1.5; border:2.5px solid var(--ink); background:#fffbf0; color:var(--ink); box-shadow:3px 3px 0 var(--ink); }
.msg.good { background:#e6ffe6; border-color:var(--green); color:var(--green-dk); box-shadow:3px 3px 0 var(--green-dk); }
.msg.bad  { background:#ffe6e6; border-color:var(--red); color:var(--red-dk); box-shadow:3px 3px 0 var(--red-dk); }
.msg.info { background:#fffbe0; border-color:var(--gold); color:#7a4400; box-shadow:3px 3px 0 var(--gold-dk); }

/* LEGEND + RESET */
.bottom-row { display:flex; gap:8px; padding:0 12px 12px; }
.legend-panel { flex:1; background:#fff; border-radius:14px; border:2.5px solid var(--ink); box-shadow:3px 3px 0 var(--ink); overflow:hidden; }
.panel-head { background:var(--blue); padding:7px 12px; font-family:'Fredoka One',cursive; font-size:0.82rem; color:#fff; letter-spacing:1px; }
.panel-body { padding:8px 12px; }
.legend-row { display:flex; align-items:center; gap:7px; font-size:0.7rem; font-weight:800; color:var(--ink); padding:5px 0; border-bottom:1.5px dashed #e8d8b0; }
.legend-row:last-child { border-bottom:none; }
.legend-tag { margin-left:auto; background:var(--gold); color:#fff; font-size:0.6rem; font-weight:900; padding:2px 6px; border-radius:6px; border:1.5px solid var(--ink); }
.reset-btn { background:#fff; border:3px solid var(--ink); border-radius:14px; font-family:'Fredoka One',cursive; font-size:0.85rem; color:var(--ink); cursor:pointer; box-shadow:3px 3px 0 var(--ink); padding:10px 14px; white-space:nowrap; align-self:flex-end; -webkit-tap-highlight-color:transparent; }
.reset-btn:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }

/* QUIZ OVERLAY */
.overlay { display:none; position:fixed; inset:0; background:rgba(0,15,50,0.82); backdrop-filter:blur(3px); z-index:100; align-items:flex-end; justify-content:center; padding:0; }
.overlay.show { display:flex; }
.quiz-card { width:100%; max-width:430px; background:#fff; border-radius:24px 24px 0 0; border:4px solid var(--ink); border-bottom:none; box-shadow:0 -6px 30px rgba(0,0,0,0.25); overflow:hidden; animation:slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1); max-height:90vh; overflow-y:auto; }
@keyframes slideUp { from{opacity:0;transform:translateY(50px);} to{opacity:1;transform:none;} }
.quiz-handle { width:40px; height:4px; background:#ddd; border-radius:2px; margin:10px auto 0; }
.quiz-header { background:var(--gold); padding:12px 18px 10px; display:flex; align-items:center; justify-content:space-between; border-bottom:3px solid var(--ink); }
.quiz-badge { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--ink); }
.quiz-for-whom { background:var(--blue); color:#fff; font-weight:800; font-size:0.72rem; padding:3px 10px; border-radius:20px; border:2px solid var(--ink); }
.quiz-body { padding:16px 18px 24px; }
.quiz-timer-rail { height:6px; background:#e0d8c0; border-radius:3px; border:1.5px solid #c8b880; margin-bottom:14px; overflow:hidden; }
.quiz-timer-fill { height:100%; background:var(--red); border-radius:2px; transition:width 1s linear; }
.quiz-q { font-weight:900; font-size:1rem; color:var(--ink); line-height:1.5; margin-bottom:14px; }
.quiz-opts { display:flex; flex-direction:column; gap:10px; }
.quiz-opt { padding:13px 15px; border:3px solid var(--ink); border-radius:12px; background:#fffbf0; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.9rem; color:var(--ink); cursor:pointer; text-align:left; box-shadow:3px 3px 0 var(--ink); -webkit-tap-highlight-color:transparent; transition:all 0.12s; }
.quiz-opt:active:not(:disabled) { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }
.quiz-opt.correct { border-color:var(--green); background:#e6ffe6; color:var(--green-dk); box-shadow:3px 3px 0 var(--green-dk); }
.quiz-opt.wrong   { border-color:var(--red); background:#ffe6e6; color:var(--red-dk); box-shadow:3px 3px 0 var(--red-dk); }

/* WIN OVERLAY */
.win-overlay { display:none; position:fixed; inset:0; background:rgba(0,15,50,0.88); backdrop-filter:blur(5px); z-index:200; align-items:center; justify-content:center; padding:20px; }
.win-overlay.show { display:flex; animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
.win-card { background:#fff; border-radius:24px; border:4px solid var(--ink); box-shadow:8px 8px 0 var(--ink); padding:32px 28px; max-width:320px; width:100%; text-align:center; position:relative; overflow:hidden; animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes popIn { from{opacity:0;transform:scale(0.65) rotate(-5deg);} to{opacity:1;transform:scale(1) rotate(0deg);} }
.win-banner { position:absolute; top:0; left:0; right:0; height:10px; background:repeating-linear-gradient(90deg,var(--red) 0%,var(--red) 20%,var(--gold) 20%,var(--gold) 40%,var(--green) 40%,var(--green) 60%,var(--blue) 60%,var(--blue) 80%,var(--red) 80%,var(--red) 100%); border-bottom:2px solid var(--ink); }
.win-token-display { font-size:4.5rem; margin:10px 0 6px; display:block; animation:bounce 0.6s ease-in-out infinite alternate; }
@keyframes bounce { from{transform:translateY(0) scale(1);} to{transform:translateY(-12px) scale(1.1);} }
.win-merdeka { font-family:'Lilita One',cursive; font-size:2.8rem; color:var(--red); text-shadow:3px 3px 0 var(--red-dk); line-height:1; margin-bottom:2px; }
.win-boleh { font-family:'Fredoka One',cursive; font-size:0.82rem; color:var(--blue); letter-spacing:4px; margin-bottom:14px; }
.win-name { font-weight:900; font-size:1rem; color:var(--ink); margin-bottom:4px; }
.win-score { font-family:'Lilita One',cursive; font-size:1.8rem; color:var(--gold); text-shadow:2px 2px 0 var(--gold-dk); margin-bottom:20px; }
.play-again { width:100%; padding:14px; background:var(--blue); color:#fff; border:3px solid var(--ink); border-radius:14px; font-family:'Fredoka One',cursive; font-size:1.1rem; letter-spacing:1px; cursor:pointer; box-shadow:5px 5px 0 var(--ink); -webkit-tap-highlight-color:transparent; }
.play-again:active { transform:translate(3px,3px); box-shadow:2px 2px 0 var(--ink); }

.conf { position:fixed; top:-10px; pointer-events:none; z-index:300; border-radius:2px; animation:confFall linear forwards; }
@keyframes confFall { to{transform:translateY(105vh) rotate(720deg);opacity:0;} }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-stripes"></div>
  <div class="header-inner">
    <div>
      <div class="header-title">MERDEKA!</div>
      <div class="header-sub">Permainan Ular &amp; Tangga</div>
    </div>
    <div class="header-flag">🇲🇾</div>
  </div>
</header>

<!-- SCOREBOARD -->
<div class="scoreboard">
  <div class="score-card active" id="ps0">
    <div class="sc-top">
      <div class="token" style="background:radial-gradient(circle at 35% 35%,#ff8888,#cc0000);">🦁</div>
      <div>
        <div class="sc-name">Harimau</div>
        <div class="sc-pos" id="ppos0">Mula</div>
      </div>
      <div class="sc-pts" id="ppts0">0</div>
    </div>
    <div class="prog-rail"><div class="prog-fill" id="pprog0" style="width:0%;background:linear-gradient(90deg,var(--red),#ff6666);"></div></div>
  </div>
  <div class="score-card" id="ps1">
    <div class="sc-top">
      <div class="token" style="background:radial-gradient(circle at 35% 35%,#6699ff,#003fa3);">🦅</div>
      <div>
        <div class="sc-name">Helang</div>
        <div class="sc-pos" id="ppos1">Mula</div>
      </div>
      <div class="sc-pts" id="ppts1">0</div>
    </div>
    <div class="prog-rail"><div class="prog-fill" id="pprog1" style="width:0%;background:linear-gradient(90deg,var(--blue),#4477ee);"></div></div>
  </div>
</div>

<!-- BOARD -->
<div class="board-wrap">
  <div class="board-frame">
    <canvas id="gc" width="532" height="532"></canvas>
  </div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <div class="dice-row">
    <div class="die" id="dieEl" onclick="rollDice()">🎲</div>
    <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 Balingkan Dadu!</button>
  </div>
  <div class="turn-lbl" id="turnLbl">Giliran Pemain 1</div>
  <div class="msg" id="msgBox">Balingkan dadu untuk memulakan pengembaraan Merdeka! 🇲🇾</div>
</div>

<!-- LEGEND + RESET -->
<div class="bottom-row">
  <div class="legend-panel">
    <div class="panel-head">📖 Panduan</div>
    <div class="panel-body">
      <div class="legend-row"><span>🪜</span> Tangga — naik! <span class="legend-tag">+5</span></div>
      <div class="legend-row"><span>🐍</span> Ular — turun!</div>
      <div class="legend-row"><span>⭐</span> Kuiz! <span class="legend-tag">+10</span></div>
    </div>
  </div>
  <button class="reset-btn" onclick="restartGame()">↺ Baru</button>
</div>

<!-- QUIZ SHEET -->
<div class="overlay" id="quizOverlay">
  <div class="quiz-card">
    <div class="quiz-handle"></div>
    <div class="quiz-header">
      <div class="quiz-badge">🌺 Cabaran Malaysia!</div>
      <div class="quiz-for-whom" id="qForWhom"></div>
    </div>
    <div class="quiz-body">
      <div class="quiz-timer-rail"><div class="quiz-timer-fill" id="qTimerFill"></div></div>
      <div class="quiz-q" id="qQuestion"></div>
      <div class="quiz-opts" id="qOptions"></div>
    </div>
  </div>
</div>

<!-- WIN SCREEN -->
<div class="win-overlay" id="winScene">
  <div class="win-card">
    <div class="win-banner"></div>
    <span class="win-token-display" id="winToken">🏆</span>
    <div class="win-merdeka">MERDEKA!</div>
    <div class="win-boleh">MALAYSIA BOLEH</div>
    <div class="win-name" id="winNameEl"></div>
    <div class="win-score" id="winPtsEl"></div>
    <button class="play-again" onclick="restartGame()">🎲 Main Lagi!</button>
  </div>
</div>

<script>
const CV=document.getElementById('gc');
const cx=CV.getContext('2d');
const COLS=8,ROWS=8,TOTAL=64,SZ=532,CS=SZ/COLS;
const LADDERS={5:26,14:35,33:52,44:62};
const SNAKES={58:12,47:21,38:9,27:6};
const QUIZ=new Set([8,16,24,32,40,48,56]);
const FLAG_RED='#CC0001',FLAG_RED2='#A80001',FLAG_WHITE='#FFFFFF',FLAG_WHT2='#F0F0F0',FLAG_BLUE='#003893',FLAG_BLUE2='#002260';
const STRIPE_BY_DR=[
  {base:FLAG_WHITE,alt:FLAG_WHT2,border:'#d0c0c0',num:'#CC0001',textDark:true},
  {base:FLAG_RED,alt:FLAG_RED2,border:'#800001',num:'#fff',textDark:false},
  {base:FLAG_WHITE,alt:FLAG_WHT2,border:'#d0c0c0',num:'#CC0001',textDark:true},
  {base:FLAG_RED,alt:FLAG_RED2,border:'#800001',num:'#fff',textDark:false},
  {base:FLAG_WHITE,alt:FLAG_WHT2,border:'#d0c0c0',num:'#CC0001',textDark:true},
  {base:FLAG_RED,alt:FLAG_RED2,border:'#800001',num:'#fff',textDark:false},
  {base:FLAG_WHITE,alt:FLAG_WHT2,border:'#d0c0c0',num:'#CC0001',textDark:true},
  {base:FLAG_RED,alt:FLAG_RED2,border:'#800001',num:'#fff',textDark:false},
];
function isCanton(dr,dc){return dr<=3&&dc<=3;}
function getCellColors(dr,dc){if(isCanton(dr,dc))return{base:FLAG_BLUE,alt:FLAG_BLUE2,border:'#001155',num:'#FFD700',textDark:false};return STRIPE_BY_DR[dr];}
function getRowCol(n){const i=n-1,boardRow=Math.floor(i/COLS),col=i%COLS,dc=boardRow%2===0?col:COLS-1-col,dr=ROWS-1-boardRow;return{boardRow,dc,dr};}
function cellXY(n){if(n<1||n>TOTAL)return null;const{dc,dr}=getRowCol(n);return{x:dc*CS+CS/2,y:dr*CS+CS/2};}

function drawBoard(){
  cx.clearRect(0,0,SZ,SZ);cx.fillStyle='#fff';cx.fillRect(0,0,SZ,SZ);
  for(let n=1;n<=TOTAL;n++){
    const{boardRow,dc,dr}=getRowCol(n);const x=dc*CS,y=dr*CS;const cc=getCellColors(dr,dc);
    const bg=dc%2===0?cc.base:cc.alt;cx.fillStyle=bg;cx.fillRect(x,y,CS,CS);
    const shine=cx.createLinearGradient(x,y,x,y+CS);
    shine.addColorStop(0,'rgba(255,255,255,0.13)');shine.addColorStop(0.5,'rgba(255,255,255,0)');shine.addColorStop(1,'rgba(0,0,0,0.08)');
    cx.fillStyle=shine;cx.fillRect(x,y,CS,CS);
    cx.strokeStyle=cc.border;cx.lineWidth=1.5;cx.strokeRect(x+0.75,y+0.75,CS-1.5,CS-1.5);
    cx.strokeStyle=isCanton(dr,dc)?'rgba(255,220,0,0.18)':'rgba(255,255,255,0.22)';cx.lineWidth=1;cx.strokeRect(x+3,y+3,CS-6,CS-6);
  }
  drawLadders();drawSnakes();drawCellLabels();drawTokens();
}

function drawCellLabels(){
  for(let n=1;n<=TOTAL;n++){
    const{dc,dr}=getRowCol(n);const x=dc*CS,y=dr*CS;const cc=getCellColors(dr,dc);
    const numX=x+4,numY=y+4;
    cx.fillStyle='rgba(0,0,0,0.28)';roundRect(cx,numX+1,numY+1,20,14,4);cx.fill();
    cx.fillStyle=cc.border;roundRect(cx,numX,numY,20,14,4);cx.fill();
    cx.fillStyle=cc.num;cx.font='bold 9px Nunito,sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(n,numX+10,numY+7);
    if(QUIZ.has(n)){
      const starCol=isCanton(dr,dc)?'#FFD700':(cc.textDark?'#CC0001':'#FFD700');
      const shadowCol=isCanton(dr,dc)?'rgba(0,0,50,0.3)':'rgba(0,0,0,0.2)';
      drawStar5(x+CS/2,y+CS/2,CS*0.22,starCol,shadowCol);
      cx.fillStyle=cc.num;cx.font='bold 8px Nunito,sans-serif';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('KUIZ',x+CS/2,y+CS/2+CS*0.22+7);
    }
    if(n===1){
      cx.fillStyle='rgba(0,0,0,0.35)';cx.font='bold 10px Nunito,sans-serif';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('MULA',x+CS/2+1,y+CS*0.78+1);cx.fillStyle=cc.textDark?'#CC0001':'#fff';cx.fillText('MULA',x+CS/2,y+CS*0.78);
    }
    if(n===TOTAL){
      drawStar5(x+CS/2,y+CS*0.5,CS*0.2,'#FFD700','rgba(0,0,0,0.3)');
      cx.fillStyle='rgba(0,0,0,0.35)';cx.font='bold 9px Nunito,sans-serif';cx.textAlign='center';cx.textBaseline='middle';
      cx.fillText('TAMAT!',x+CS/2+1,y+CS*0.82+1);cx.fillStyle='#FFD700';cx.fillText('TAMAT!',x+CS/2,y+CS*0.82);
    }
  }
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();}
function drawStar5(x,y,r,fill,shadow){
  if(shadow){cx.fillStyle=shadow;cx.beginPath();for(let i=0;i<5;i++){const a=Math.PI/2+i*Math.PI*2/5,b=a+Math.PI/5;if(i===0)cx.moveTo(x+Math.cos(a)*r+1.5,y-Math.sin(a)*r+1.5);else cx.lineTo(x+Math.cos(a)*r+1.5,y-Math.sin(a)*r+1.5);cx.lineTo(x+Math.cos(b)*r*0.42+1.5,y-Math.sin(b)*r*0.42+1.5);}cx.closePath();cx.fill();}
  cx.fillStyle=fill;cx.beginPath();for(let i=0;i<5;i++){const a=Math.PI/2+i*Math.PI*2/5,b=a+Math.PI/5;if(i===0)cx.moveTo(x+Math.cos(a)*r,y-Math.sin(a)*r);else cx.lineTo(x+Math.cos(a)*r,y-Math.sin(a)*r);cx.lineTo(x+Math.cos(b)*r*0.42,y-Math.sin(b)*r*0.42);}cx.closePath();cx.fill();
}

const LADDER_COLORS=[
  {rail:'#8B0000',rung:'#CC2200',hi:'#FF6644',post:'#4a0000'},
  {rail:'#005A00',rung:'#009900',hi:'#44CC44',post:'#002800'},
  {rail:'#00338A',rung:'#0055CC',hi:'#4499FF',post:'#001040'},
  {rail:'#7A4400',rung:'#CC7700',hi:'#FFAA22',post:'#402000'},
];
function drawLadders(){
  let ci=0;
  for(const[from,to]of Object.entries(LADDERS)){
    const a=cellXY(+from),b=cellXY(+to);if(!a||!b){ci++;continue;}
    const lc=LADDER_COLORS[ci%LADDER_COLORS.length];
    const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy),ux=dx/len,uy=dy/len,px=-uy*9,py=ux*9;
    cx.save();cx.translate(2,2);cx.strokeStyle='rgba(0,0,0,0.18)';cx.lineWidth=4;cx.lineCap='round';
    cx.beginPath();cx.moveTo(a.x+px,a.y+py);cx.lineTo(b.x+px,b.y+py);cx.stroke();
    cx.beginPath();cx.moveTo(a.x-px,a.y-py);cx.lineTo(b.x-px,b.y-py);cx.stroke();cx.restore();
    cx.strokeStyle=lc.post;cx.lineWidth=4;cx.lineCap='round';
    cx.beginPath();cx.moveTo(a.x+px,a.y+py);cx.lineTo(b.x+px,b.y+py);cx.stroke();
    cx.beginPath();cx.moveTo(a.x-px,a.y-py);cx.lineTo(b.x-px,b.y-py);cx.stroke();
    cx.strokeStyle=lc.rail;cx.lineWidth=3;
    cx.beginPath();cx.moveTo(a.x+px,a.y+py);cx.lineTo(b.x+px,b.y+py);cx.stroke();
    cx.beginPath();cx.moveTo(a.x-px,a.y-py);cx.lineTo(b.x-px,b.y-py);cx.stroke();
    const steps=Math.max(3,Math.round(len/16));
    for(let i=1;i<steps;i++){
      const t=i/steps,rx=a.x+dx*t,ry=a.y+dy*t;
      cx.strokeStyle='rgba(0,0,0,0.15)';cx.lineWidth=2.5;cx.lineCap='round';
      cx.beginPath();cx.moveTo(rx+px+1.5,ry+py+1.5);cx.lineTo(rx-px+1.5,ry-py+1.5);cx.stroke();
      cx.strokeStyle=lc.post;cx.lineWidth=2.5;cx.beginPath();cx.moveTo(rx+px,ry+py);cx.lineTo(rx-px,ry-py);cx.stroke();
      cx.strokeStyle=lc.rung;cx.lineWidth=2;cx.beginPath();cx.moveTo(rx+px,ry+py);cx.lineTo(rx-px,ry-py);cx.stroke();
    }
    const labelColor=(+from===14||+from===44)?'#E8001A':'#fff';
    [[a,6,'+5'],[b,5,'▲']].forEach(([pt,r,lbl],idx)=>{
      cx.fillStyle=lc.post;cx.beginPath();cx.arc(pt.x,pt.y,r+1.5,0,Math.PI*2);cx.fill();
      cx.fillStyle=lc.rung;cx.beginPath();cx.arc(pt.x,pt.y,r,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(pt.x-1.5,pt.y-1.5,r*0.4,0,Math.PI*2);cx.fill();
      if(idx===0){cx.fillStyle=labelColor;cx.font='bold 10px Nunito,sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(lbl,pt.x,pt.y+r+7);}
    });
    ci++;
  }
}

const SNAKE_COLORS=[
  {body1:'#1a6600',body2:'#2ecc00',scale:'#0d4400',tongue:'#ff2244',eye:'#ffe000'},
  {body1:'#7a0000',body2:'#cc2200',scale:'#440000',tongue:'#ffaa00',eye:'#ffe000'},
  {body1:'#005580',body2:'#0099cc',scale:'#002840',tongue:'#ff4488',eye:'#fff'},
  {body1:'#5a0066',body2:'#aa00cc',scale:'#2d0033',tongue:'#ffdd00',eye:'#fff'},
];
function drawSnakes(){
  let ci=0;
  for(const[from,to]of Object.entries(SNAKES)){
    const a=cellXY(+from),b=cellXY(+to);if(!a||!b){ci++;continue;}
    const sc=SNAKE_COLORS[ci%SNAKE_COLORS.length];
    const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy);
    const STEPS=32,pts=[];
    for(let i=0;i<=STEPS;i++){const t=i/STEPS,bx=a.x+dx*t,by=a.y+dy*t,wAmp=9*(1-t*0.4),wave=Math.sin(i*0.65)*wAmp;pts.push({x:bx-(dy/len)*wave,y:by+(dx/len)*wave});}
    cx.beginPath();cx.moveTo(pts[1].x+3,pts[1].y+3);for(let i=2;i<pts.length;i++)cx.lineTo(pts[i].x+3,pts[i].y+3);
    cx.strokeStyle='rgba(0,0,0,0.2)';cx.lineWidth=14;cx.lineCap='round';cx.lineJoin='round';cx.setLineDash([]);cx.stroke();
    cx.beginPath();cx.moveTo(pts[1].x,pts[1].y);for(let i=2;i<pts.length;i++)cx.lineTo(pts[i].x,pts[i].y);
    cx.strokeStyle=sc.body1;cx.lineWidth=12;cx.stroke();cx.strokeStyle=sc.body2;cx.lineWidth=9;cx.stroke();
    for(let i=2;i<pts.length-2;i+=2){cx.fillStyle=i%4===0?sc.body1:sc.scale;cx.beginPath();cx.arc(pts[i].x,pts[i].y,3,0,Math.PI*2);cx.fill();}
    cx.beginPath();cx.moveTo(pts[1].x,pts[1].y);for(let i=2;i<pts.length;i++)cx.lineTo(pts[i].x,pts[i].y);
    cx.strokeStyle='rgba(255,255,255,0.18)';cx.lineWidth=3.5;cx.stroke();
    const hdx=pts[1].x-pts[0].x,hdy=pts[1].y-pts[0].y,ang=Math.atan2(-hdy,-hdx);
    cx.save();cx.translate(a.x,a.y);cx.rotate(ang);
    cx.fillStyle='rgba(0,0,0,0.22)';cx.beginPath();cx.ellipse(2,2,14,10,0,0,Math.PI*2);cx.fill();
    cx.fillStyle=sc.body1;cx.beginPath();cx.ellipse(0,0,14,10,0,0,Math.PI*2);cx.fill();
    cx.fillStyle=sc.body2;cx.beginPath();cx.ellipse(0,0,12,8.5,0,0,Math.PI*2);cx.fill();
    cx.fillStyle='rgba(255,255,255,0.18)';cx.beginPath();cx.ellipse(-2,-2.5,7,4,-0.3,0,Math.PI*2);cx.fill();
    [[-5],[5]].forEach(([oz])=>{
      cx.fillStyle='#111';cx.beginPath();cx.arc(4,oz,4,0,Math.PI*2);cx.fill();
      cx.fillStyle=sc.eye;cx.beginPath();cx.arc(4,oz,3,0,Math.PI*2);cx.fill();
      cx.fillStyle='#000';cx.beginPath();cx.arc(4.5,oz+0.5,1.5,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.beginPath();cx.arc(3.2,oz-1,0.8,0,Math.PI*2);cx.fill();
    });
    cx.strokeStyle=sc.tongue;cx.lineWidth=2;cx.lineCap='round';
    cx.beginPath();cx.moveTo(14,0);cx.lineTo(20,0);cx.stroke();
    cx.beginPath();cx.moveTo(20,0);cx.lineTo(25,-4);cx.stroke();
    cx.beginPath();cx.moveTo(20,0);cx.lineTo(25,4);cx.stroke();
    cx.fillStyle=sc.body1;cx.beginPath();cx.arc(9,-4.5,1.5,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(9,4.5,1.5,0,Math.PI*2);cx.fill();
    cx.restore();cx.setLineDash([]);ci++;
  }
}

function drawTokens(){
  const colors=[{bg:'#8a0000',rim:'#CC0001',hi:'#ff9090'},{bg:'#001d55',rim:'#003893',hi:'#7799ee'}];
  players.forEach((p,i)=>{
    if(p.pos===0&&!p.floatXY)return;
    const base=cellXY(p.pos)||{x:0,y:0};const pt=p.floatXY||base;const ox=i===0?-11:11;const c=colors[i];
    cx.fillStyle='rgba(0,0,0,0.25)';cx.beginPath();cx.ellipse(pt.x+ox+2,pt.y+8,12,4,0,0,Math.PI*2);cx.fill();
    cx.fillStyle=c.bg;cx.beginPath();cx.arc(pt.x+ox,pt.y,16,0,Math.PI*2);cx.fill();
    const g=cx.createRadialGradient(pt.x+ox-5,pt.y-5,2,pt.x+ox,pt.y,15);
    g.addColorStop(0,c.hi);g.addColorStop(1,c.bg);cx.fillStyle=g;cx.beginPath();cx.arc(pt.x+ox,pt.y,15,0,Math.PI*2);cx.fill();
    cx.strokeStyle=c.rim;cx.lineWidth=2.5;cx.beginPath();cx.arc(pt.x+ox,pt.y,15,0,Math.PI*2);cx.stroke();
    cx.strokeStyle='#1a0a00';cx.lineWidth=1.5;cx.beginPath();cx.arc(pt.x+ox,pt.y,15,0,Math.PI*2);cx.stroke();
    if(i===cur&&!over){cx.strokeStyle='#FFD700';cx.lineWidth=3;cx.beginPath();cx.arc(pt.x+ox,pt.y,20,0,Math.PI*2);cx.stroke();}
    cx.font='14px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(p.token,pt.x+ox,pt.y+1);
  });
}

let players=mkPlayers();
function mkPlayers(){return[{pos:0,score:0,name:'Harimau',token:'🦁'},{pos:0,score:0,name:'Helang',token:'🦅'}];}
let cur=0,over=false,rolling=false,pendingQ=false,timID=null;

function updateUI(){
  players.forEach((p,i)=>{
    document.getElementById(`ppos${i}`).textContent=p.pos===0?'Mula':p.pos===TOTAL?'Tamat!':'Petak '+p.pos;
    document.getElementById(`ppts${i}`).textContent=p.score;
    document.getElementById(`pprog${i}`).style.width=(p.pos/TOTAL*100)+'%';
    document.getElementById(`ps${i}`).className='score-card'+(i===cur&&!over?' active':'');
  });
  document.getElementById('turnLbl').textContent=over?'Permainan Tamat':players[cur].name+' punya giliran';
}
function msg(txt,type=''){const el=document.getElementById('msgBox');el.textContent=txt;el.className='msg '+(type||'');}
const FACES=['','⚀','⚁','⚂','⚃','⚄','⚅'];

function rollDice(){
  if(rolling||over||pendingQ)return;
  rolling=true;document.getElementById('rollBtn').disabled=true;
  const die=document.getElementById('dieEl');die.classList.add('shake');
  let t=0;
  const iv=setInterval(()=>{
    die.textContent=FACES[Math.floor(Math.random()*6)+1];
    if(++t>14){clearInterval(iv);die.classList.remove('shake');const roll=Math.floor(Math.random()*6)+1;die.textContent=FACES[roll];setTimeout(()=>applyMove(roll),300);}
  },70);
}

function animStep(p,from,to,cb){
  const path=[];
  if(to>=from)for(let i=from+1;i<=to;i++)path.push(i);else for(let i=from-1;i>=to;i--)path.push(i);
  if(!path.length){cb();return;}let i=0;
  const go=()=>{if(i>=path.length){p.floatXY=null;cb();return;}p.pos=path[i++];p.floatXY=null;drawBoard();setTimeout(go,95);};go();
}
function buildSmoothPath(from,to,snake=false){
  const a=cellXY(from),b=cellXY(to);if(!a||!b)return[];
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy),pts=[],steps=snake?32:44;
  for(let i=0;i<=steps;i++){const t=i/steps,bx=a.x+dx*t,by=a.y+dy*t,wave=snake?Math.sin(i*0.65)*9*(1-t*0.4):0;pts.push({x:bx-(dy/len)*wave,y:by+(dx/len)*wave});}return pts;
}
function animPath(p,pts,ms,cb){let i=0;const go=()=>{if(i>=pts.length){p.floatXY=null;cb();return;}p.floatXY=pts[i++];drawBoard();setTimeout(go,ms);};go();}

function applyMove(roll){
  const p=players[cur];let nxt=p.pos+roll;
  if(nxt>TOTAL)nxt=TOTAL-(nxt-TOTAL);
  msg(`${p.token} ${p.name} dapat nombor ${roll}!`);
  animStep(p,p.pos,nxt,()=>{
    p.pos=nxt;drawBoard();updateUI();
    if(nxt===TOTAL){triggerWin();return;}
    if(LADDERS[nxt]){
      const dest=LADDERS[nxt];msg(`🪜 Tangga! ${p.name} naik ke petak ${dest}! +5 mata`,'good');
      setTimeout(()=>animPath(p,buildSmoothPath(nxt,dest,false),28,()=>{p.pos=dest;p.score+=5;drawBoard();updateUI();checkQ();}),350);
    }else if(SNAKES[nxt]){
      const dest=SNAKES[nxt];msg(`🐍 Ular gigit! ${p.name} turun ke petak ${dest}!`,'bad');
      setTimeout(()=>animPath(p,buildSmoothPath(nxt,dest,true),38,()=>{p.pos=dest;drawBoard();updateUI();endTurn();}),350);
    }else if(QUIZ.has(nxt)){
      msg(`⭐ Petak Bintang! Jawab soalan untuk mata bonus!`,'info');setTimeout(showQuiz,400);
    }else{endTurn();}
  });
}
function checkQ(){if(QUIZ.has(players[cur].pos))setTimeout(showQuiz,300);else endTurn();}

const Qs=[
  {q:"Apakah yang disambut pada 31 Ogos?",opts:["Hari Raya","Hari Malaysia","Hari Merdeka","Hari Guru"],a:2},
  {q:"Apakah ibu negara Malaysia?",opts:["Putrajaya","Kuala Lumpur","George Town","Ipoh"],a:1},
  {q:"Apakah bunga kebangsaan Malaysia?",opts:["Mawar","Orkid","Lotus","Bunga Raya"],a:3},
  {q:"Apakah gunung tertinggi di Malaysia?",opts:["Gunung Kinabalu","Gunung Tahan","Gunung Mulu","Gunung Ledang"],a:0},
  {q:"Apakah sukan kebangsaan Malaysia?",opts:["Bola Sepak","Hoki","Sepak Takraw","Badminton"],a:3},
  {q:"Berapa jalur pada Jalur Gemilang?",opts:["11","13","14","16"],a:2},
  {q:"Apakah haiwan kebangsaan Malaysia?",opts:["Gajah","Harimau Malaya","Helang","Tapir"],a:1},
  {q:"Bilakah Malaysia (Persekutuan) ditubuhkan?",opts:["1957","1960","1963","1969"],a:2},
  {q:"Apakah bahasa kebangsaan Malaysia?",opts:["Inggeris","Tamil","Mandarin","Bahasa Malaysia"],a:3},
  {q:"Berapakah ketinggian Menara Berkembar Petronas?",opts:["350m","388m","420m","452m"],a:3},
  {q:"Apakah burung kebangsaan Malaysia?",opts:["Helang","Helang Gading","Merak","Pekaka"],a:1},
  {q:"Negeri manakah Gunung Kinabalu terletak?",opts:["Sarawak","Kelantan","Sabah","Johor"],a:2},
  {q:"Apakah maksud 'Merdeka'?",opts:["Perpaduan","Kebebasan","Kemenangan","Harmoni"],a:1},
  {q:"Tahun berapakah Tanah Melayu merdeka?",opts:["1955","1956","1957","1958"],a:2},
  {q:"Apakah sungai terpanjang di Malaysia?",opts:["Kinabatangan","Rajang","Pahang","Perak"],a:1},
  {q:"Apakah mata wang Malaysia?",opts:["Baht","Ringgit","Dollar","Peso"],a:1},
];

function showQuiz(){
  pendingQ=true;const q=Qs[Math.floor(Math.random()*Qs.length)];
  document.getElementById('qForWhom').textContent='🎯 '+players[cur].name;
  document.getElementById('qQuestion').textContent=q.q;
  const opts=document.getElementById('qOptions');opts.innerHTML='';
  q.opts.forEach((o,i)=>{const btn=document.createElement('button');btn.className='quiz-opt';btn.textContent=o;btn.onclick=()=>answerQ(i,q,btn,opts);opts.appendChild(btn);});
  document.getElementById('quizOverlay').classList.add('show');
  const fill=document.getElementById('qTimerFill');fill.style.transition='none';fill.style.width='100%';
  setTimeout(()=>{fill.style.transition='width 12s linear';fill.style.width='0%';},40);
  if(timID)clearTimeout(timID);
  timID=setTimeout(()=>{
    if(!pendingQ)return;
    opts.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
    opts.querySelectorAll('.quiz-opt')[q.a].className='quiz-opt correct';
    msg(`⏱️ Masa habis! Jawapan: ${q.opts[q.a]}`,'bad');
    setTimeout(()=>closeQuiz(()=>endTurn()),1500);
  },12000);
}
function answerQ(i,q,btn,opts){
  if(!pendingQ)return;clearTimeout(timID);
  opts.querySelectorAll('.quiz-opt').forEach(b=>b.disabled=true);
  const p=players[cur];
  if(i===q.a){
    btn.className='quiz-opt correct';p.score+=10;
    msg(`✅ Betul! +10 mata untuk ${p.name}! Maju 2 petak!`,'good');
    setTimeout(()=>closeQuiz(()=>{const bonus=Math.min(p.pos+2,TOTAL);animStep(p,p.pos,bonus,()=>{p.pos=bonus;drawBoard();updateUI();if(bonus===TOTAL)triggerWin();else endTurn();});}),1600);
  }else{
    opts.querySelectorAll('.quiz-opt')[q.a].className='quiz-opt correct';btn.className='quiz-opt wrong';
    msg(`❌ Salah! Jawapan betul: ${q.opts[q.a]}`,'bad');
    setTimeout(()=>closeQuiz(()=>endTurn()),1800);
  }
  updateUI();
}
function closeQuiz(cb){document.getElementById('quizOverlay').classList.remove('show');pendingQ=false;if(cb)cb();}
function endTurn(){cur=cur===0?1:0;rolling=false;document.getElementById('rollBtn').disabled=false;updateUI();msg(`${players[cur].token} ${players[cur].name} — balingkan dadu!`);}

function triggerWin(){
  over=true;const p=players[cur];p.score+=50;updateUI();
  document.getElementById('winToken').textContent=p.token;
  document.getElementById('winNameEl').textContent=`${p.name} menang! 🇲🇾`;
  document.getElementById('winPtsEl').textContent=`${p.score} mata`;
  document.getElementById('winScene').classList.add('show');fireConfetti();
}
function fireConfetti(){
  const cols=['#E8001A','#F5A800','#003FA3','#00A846','#fff','#7B2D8B','#E87000'];
  for(let i=0;i<100;i++){setTimeout(()=>{const el=document.createElement('div');el.className='conf';const s=6+Math.random()*10;el.style.cssText=`left:${Math.random()*100}vw;width:${s}px;height:${s}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>0.4?'50%':'3px'};animation-duration:${1.5+Math.random()*2.2}s;animation-delay:${Math.random()*0.5}s;opacity:1`;document.body.appendChild(el);setTimeout(()=>el.remove(),5000);},i*14);}
}
function restartGame(){
  players=mkPlayers();players.forEach(p=>p.floatXY=null);
  cur=0;over=false;rolling=false;pendingQ=false;clearTimeout(timID);
  document.getElementById('rollBtn').disabled=false;
  document.getElementById('dieEl').textContent='🎲';
  document.getElementById('quizOverlay').classList.remove('show');
  document.getElementById('winScene').classList.remove('show');
  msg('Balingkan dadu untuk memulakan pengembaraan Merdeka! 🇲🇾');
  drawBoard();updateUI();
}
drawBoard();updateUI();
</script>
